# nginx.ssl.conf — Production, HTTPS

# Handles SSL termination. Port 80 (HTTP) redirects to HTTPS (port 443)
# serves the application and routes to upstream services

################################################################
#                                                              # 
# Placeholders (replace before use):                           #
#   {{FRONTEND_PORT}}   e.g. 3000                              #
#   {{BACKEND_PORT}}    e.g. 8081                              #
#   {{API_PREFIX}}      e.g. /api                              #
#   {{DOMAIN}}          e.g. yourdomain.com                    #
#                                                              #                        
################################################################

# Certificate paths:
#   Purchased certificate:  /etc/nginx/certs/fullchain.crt
#                           /etc/nginx/certs/{{DOMAIN}}.key

# The file is pre-configured for a purchased certificate 

events {
  worker_connections 1024;
}

http {
  client_max_body_size 50M;

  upstream frontend {
    server frontend:{{FRONTEND_PORT}};
  }

  upstream backend {
    server backend:{{BACKEND_PORT}};
  }

  # Redirect all HTTP traffic to HTTPS
  server {
    listen 80;
    server_name {{DOMAIN}};
    return 301 https://$host$request_uri;
    
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name {{DOMAIN}};

    # Purchased certificate (Namecheap, DigiCert, etc.)
    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/{{DOMAIN}}.key;


    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    location {{API_PREFIX}}/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
