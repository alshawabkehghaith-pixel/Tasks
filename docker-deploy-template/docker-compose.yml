# docker-compose.yml

######################################################################################## 
#                                                                                      #
# Placeholders (replace before use):                                                   #
#   {{BACKEND_PORT}}            e.g. 8081                                              #
#   {{FRONTEND_PORT}}           e.g. 3000                                              #
#   {{BACKEND_INTERNAL_URL}}    e.g. http://backend:{{BACKEND_PORT}}                   #
#   {{BACKEND_HEALTHCHECK_URL}} e.g. http://localhost:{{BACKEND_PORT}}/api/healthz     #
#                                                                                      #
########################################################################################  

# Architecture:
#   nginx is the only service with published ports. backend and
#   frontend use `expose`, making them reachable only within the
#   Docker network — never directly from the host or internet

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    expose:
      - "{{BACKEND_PORT}}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('{{BACKEND_HEALTHCHECK_URL}}')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL={{BACKEND_INTERNAL_URL}}
    expose:
      - "{{FRONTEND_PORT}}"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
