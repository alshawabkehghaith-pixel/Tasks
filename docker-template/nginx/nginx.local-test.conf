# =============================================================================
# NGINX CONFIG — LOCAL TEST ONLY (Phase 1)
# =============================================================================
# PURPOSE: Used ONLY to validate Nginx routing before building any Docker images.
# Run this as a standalone container while the backend and frontend are running
# natively on your machine (npm run dev, python -m app.server, etc.)
#
# On Windows/Mac with Docker Desktop, containers reach the host machine via
# the special hostname: host.docker.internal
#
# Placeholders to replace (use Ctrl+F to find each one):
#
#   {{BACKEND_PORT}}       e.g. 8081
#   {{FRONTEND_PORT}}      e.g. 3000
#   {{API_PREFIX}}         e.g. /api        (must include leading slash)
#
# How to run:
#   docker run --rm -p 80:80 \
#     -v "${PWD}/nginx/nginx.local-test.conf:/etc/nginx/nginx.conf:ro" \
#     nginx:alpine
#
# Then test:
#   curl http://localhost/{{API_PREFIX}}/healthz     <- should return backend JSON
#   curl http://localhost/                           <- should return frontend HTML
# =============================================================================

events {
  worker_connections 1024;
}

http {
  client_max_body_size 50M;

  server {
    listen 80;

    location {{API_PREFIX}}/ {
      proxy_pass         http://host.docker.internal:{{BACKEND_PORT}};
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location / {
      proxy_pass         http://host.docker.internal:{{FRONTEND_PORT}};
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
