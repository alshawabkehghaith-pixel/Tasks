# =============================================================================
# NGINX CONFIG — PRODUCTION WITH SSL/HTTPS
# Use this when deploying with a domain and Let's Encrypt or self-signed cert.
# =============================================================================
# Placeholders to replace (use Ctrl+F to find each one):
#
#   {{FRONTEND_PORT}}      e.g. 3000
#   {{BACKEND_PORT}}       e.g. 8081
#   {{API_PREFIX}}         e.g. /api        (must include leading slash)
#   {{DOMAIN_NAME}}        e.g. app.hrdf.com  (used in server_name + cert paths)
#
# Certificate paths:
#   Let's Encrypt:   /etc/letsencrypt/live/{{DOMAIN_NAME}}/fullchain.pem
#                    /etc/letsencrypt/live/{{DOMAIN_NAME}}/privkey.pem
#   Self-signed:     /etc/nginx/certs/selfsigned.crt
#                    /etc/nginx/certs/selfsigned.key
#
# The cert path lines are pre-filled for Let's Encrypt. If using self-signed,
# swap the ssl_certificate lines as shown in the comments.
# =============================================================================

events {
  worker_connections 1024;
}

http {
  client_max_body_size 50M;

  upstream frontend {
    server frontend:{{FRONTEND_PORT}};
  }

  upstream backend {
    server backend:{{BACKEND_PORT}};
  }

  # --- Block 1: HTTP — redirect all traffic to HTTPS ---
  # This block exists only to catch plain HTTP requests and upgrade them.
  # The /.well-known/acme-challenge/ location is required for Certbot to
  # renew the certificate without taking Nginx down.
  server {
    listen 80;
    server_name {{DOMAIN_NAME}};

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # --- Block 2: HTTPS — the actual application ---
  server {
    listen 443 ssl;
    server_name {{DOMAIN_NAME}};

    # Let's Encrypt certificate paths (replace with self-signed paths if testing locally)
    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN_NAME}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN_NAME}}/privkey.pem;

    # Self-signed certificate paths (uncomment and comment out Let's Encrypt lines above)
    # ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    # ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Mozilla-recommended modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # --- {{API_PREFIX}} — routes to the backend ---
    location {{API_PREFIX}}/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      # Tell the backend the original request was HTTPS
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # --- / — routes to the frontend (catch-all, must be last) ---
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
