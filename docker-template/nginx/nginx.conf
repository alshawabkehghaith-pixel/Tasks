# =============================================================================
# NGINX CONFIG — PRODUCTION (HTTP only, no SSL)
# Use this when deploying behind a cloud load balancer that handles SSL,
# or as the base before adding SSL in nginx.ssl.conf.
# =============================================================================
# Placeholders to replace (use Ctrl+F to find each one):
#
#   {{APP_NAME}}           e.g. docchecker  (used in comments only, for clarity)
#   {{FRONTEND_PORT}}      e.g. 3000
#   {{BACKEND_PORT}}       e.g. 8081
#   {{API_PREFIX}}         e.g. /api        (must include leading slash)
#
# Optional additional routes — copy the location block pattern for each extra service:
#   Airflow UI:   location /airflow/ { proxy_pass http://airflow-webserver:8080/airflow/; }
# =============================================================================

events {
  worker_connections 1024;
}

http {
  # Increase for large file uploads (PDFs, Office documents, etc.)
  # Raise this value if users upload files larger than 50MB
  client_max_body_size 50M;

  upstream frontend {
    server frontend:{{FRONTEND_PORT}};
  }

  upstream backend {
    server backend:{{BACKEND_PORT}};
  }

  server {
    listen 80;

    # --- {{API_PREFIX}} — routes to the backend ---
    location {{API_PREFIX}}/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Extended timeouts for long-running jobs (LLM calls, file processing, etc.)
      # Increase if jobs take longer than 5 minutes
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # --- / — routes to the frontend (catch-all, must be last) ---
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      # Required for WebSocket support (Next.js HMR, real-time features)
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
